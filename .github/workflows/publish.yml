name: Publish

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions: {}

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write
      id-token: write
      attestations: write

    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Java
        uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654  # v5
        with:
          java-version: ${{ vars.JAVA_VERSION || '25' }}
          distribution: 'temurin'
          cache: 'maven'
          server-id: github
          server-username: GITHUB_ACTOR
          server-password: GITHUB_TOKEN

      - name: Resolve latest parent version
        run: |
          METADATA_URL="https://maven.pkg.github.com/sajeth/m2-java-parent/io/github/sajeth/m2-commons-parent/maven-metadata.xml"
          METADATA=$(curl -sf -u "${GITHUB_ACTOR}:${GH_PACKAGES_TOKEN}" "$METADATA_URL" || echo "")

          if [ -z "$METADATA" ]; then
            echo "::error::Could not fetch $METADATA_URL — Ensure m2-commons-parent is published from m2-java-parent and GH_PACKAGES_TOKEN secret has read:packages scope."
            exit 1
          fi

          LATEST_PARENT=$(echo "$METADATA" | grep -oP '(?<=<release>)[^<]+' | head -1)
          if [ -z "$LATEST_PARENT" ]; then
            LATEST_PARENT=$(echo "$METADATA" | grep -oP '(?<=<latest>)[^<]+' | head -1)
          fi

          if [ -z "$LATEST_PARENT" ]; then
            echo "::error::Fetched maven-metadata.xml but could not parse a version from it."
            exit 1
          fi

          echo "Resolved latest m2-commons-parent: $LATEST_PARENT"
          echo "LATEST_PARENT=$LATEST_PARENT" >> "$GITHUB_ENV"
        env:
          GH_PACKAGES_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}

      - name: Update parent version and bump project version
        run: python3 .github/scripts/update_pom.py "$LATEST_PARENT"

      - name: Commit version bump
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git diff --cached --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Generate CycloneDX SBOM
        run: |
          mvn --no-transfer-progress org.cyclonedx:cyclonedx-maven-plugin:makeAggregateBom \
            -DskipTests --batch-mode
        env:
          GITHUB_TOKEN: ${{ secrets.GH_PACKAGES_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Create GitHub Release with SBOM
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_VERSION: ${{ env.NEW_VERSION }}
          RELEASE_SHA: ${{ github.sha }}
        run: |
          gh release create "v${RELEASE_VERSION}" \
            --title "v${RELEASE_VERSION}" \
            --generate-notes \
            --target "${RELEASE_SHA}" \
            target.nosync/bom.json \
            target.nosync/bom.xml

      - name: Generate SLSA provenance attestation
        uses: actions/attest-build-provenance@e8998f949152b193b063cb0ec769d69d929409be  # v2
        with:
          subject-path: |
            target.nosync/bom.json
            target.nosync/bom.xml
