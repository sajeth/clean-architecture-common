name: Publish to GitHub Packages

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Update parent to latest and bump project version
        run: |
          LATEST_PARENT=$(gh api \
            "/users/sajeth/packages/maven/com.saji.m2.parent.m2-commons-parent/versions" \
            --jq '.[0].name' 2>/dev/null || echo "")
          python3 .github/scripts/update_pom.py "$LATEST_PARENT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git diff --cached --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests --settings .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
