name: Publish to GitHub Packages

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'
        env:
          FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

      - name: Resolve latest parent version
        run: |
          METADATA_URL="https://maven.pkg.github.com/sajeth/m2-java-parent/com/saji/m2/parent/m2-commons-parent/maven-metadata.xml"
          METADATA=$(curl -sf -u "x:$GITHUB_TOKEN" "$METADATA_URL" || echo "")

          if [ -z "$METADATA" ]; then
            echo "::error::Could not fetch $METADATA_URL — ensure m2-commons-parent is published from m2-java-parent and the token has read:packages scope."
            exit 1
          fi

          LATEST_PARENT=$(echo "$METADATA" | grep -oP '(?<=<release>)[^<]+' | head -1)
          if [ -z "$LATEST_PARENT" ]; then
            LATEST_PARENT=$(echo "$METADATA" | grep -oP '(?<=<latest>)[^<]+' | head -1)
          fi

          if [ -z "$LATEST_PARENT" ]; then
            echo "::error::Fetched maven-metadata.xml but could not parse a version from it."
            exit 1
          fi

          echo "Resolved latest m2-commons-parent: $LATEST_PARENT"
          echo "LATEST_PARENT=$LATEST_PARENT" >> "$GITHUB_ENV"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update parent version and bump project version
        run: python3 .github/scripts/update_pom.py "$LATEST_PARENT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git diff --cached --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests --settings .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
