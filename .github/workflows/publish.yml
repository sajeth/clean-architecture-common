name: Publish to GitHub Packages

on:
  push:
    branches: [master]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: Resolve latest parent version
        run: |
          PACKAGE_NAME=$(gh api "/users/sajeth/packages?package_type=maven&per_page=100" \
            --jq '[.[] | select(.name | ascii_downcase | contains("m2-commons-parent"))] | .[0].name' \
            2>/dev/null || echo "")

          if [ -z "$PACKAGE_NAME" ] || [ "$PACKAGE_NAME" = "null" ]; then
            echo "::error::Could not find m2-commons-parent in sajeth's GitHub Packages. Ensure it has been published from the m2-java-parent repo."
            exit 1
          fi

          LATEST_PARENT=$(gh api "/users/sajeth/packages/maven/${PACKAGE_NAME}/versions" \
            --jq '.[0].name' 2>/dev/null || echo "")

          if [ -z "$LATEST_PARENT" ] || [ "$LATEST_PARENT" = "null" ]; then
            echo "::error::Found package ${PACKAGE_NAME} but could not retrieve its versions."
            exit 1
          fi

          echo "Resolved latest m2-commons-parent: $LATEST_PARENT"
          echo "LATEST_PARENT=$LATEST_PARENT" >> "$GITHUB_ENV"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Update parent version and bump project version
        run: python3 .github/scripts/update_pom.py "$LATEST_PARENT"

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pom.xml
          git diff --cached --quiet || git commit -m "chore: bump version to $NEW_VERSION [skip ci]"
          git push

      - name: Deploy to GitHub Packages
        run: mvn --no-transfer-progress deploy -DskipTests --settings .github/maven-settings.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
